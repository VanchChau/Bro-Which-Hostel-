<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bro, Which Hostel?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#ecfeff',
                            100: '#cffafe',
                            200: '#a5f3fc',
                            300: '#67e8f9',
                            400: '#22d3ee',
                            500: '#06b6d4',
                            600: '#0891b2',
                            700: '#0e7490',
                            800: '#155e75',
                            900: '#164e63',
                        },
                        hostel: {
                            dark: '#0f0f1a',
                            card: '#1a1a2e',
                            cardHover: '#22223a',
                            surface: '#16162a',
                            border: '#2a2a4a',
                            muted: '#8888aa',
                        }
                    },
                    fontFamily: {
                        heading: ['Space Grotesk', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-hostel-dark text-gray-100 font-body min-h-screen">

    <!-- Navbar -->
     
    <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 bg-hostel-dark/80 backdrop-blur-xl border-b border-hostel-border">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="#" onclick="navigateTo('home')" class="flex items-center gap-2 cursor-pointer group">
                    <span class="text-2xl">🏠</span>
                    <span class="font-heading font-bold text-xl text-brand-400 group-hover:text-brand-300 transition-colors">Bro, Which Hostel?</span>
                </a>
                <div class="flex items-center gap-3">
                    <!-- Toggle button completely removed from here -->
                    <button onclick="navigateTo('home')" class="hidden sm:flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm text-gray-400 hover:text-gray-200 hover:bg-hostel-card transition-all">
                        <i data-lucide="layout-grid" class="w-4 h-4"></i>
                        All Hostels
                    </button>
                    <button onclick="navigateTo('about')"
class="hidden sm:flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm text-gray-400 hover:text-gray-200 hover:bg-hostel-card transition-all">

<i data-lucide="user" class="w-4 h-4"></i>
About
</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app" class="pt-16"></main>

    <!-- Image Modal -->
    <div id="imageModal" class="fixed inset-0 z-[100] bg-black/90 hidden items-center justify-center p-4" onclick="closeImageModal(event)">
        <button onclick="closeImageModal()" class="absolute top-4 right-4 text-white/70 hover:text-white transition-colors">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>
        <img id="modalImage" src="" alt="" class="max-w-full max-h-[85vh] rounded-xl object-contain">
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-[90] flex flex-col gap-2"></div>

    <script src="script.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
        initApp();
    </script>
</body>
</html>
